<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d2a2a" />
      <stop offset="70%" stop-color="#071a1a" />
      <stop offset="100%" stop-color="#020f0f" />
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="transparent" />
      <stop offset="100%" stop-color="#00e5c8" stop-opacity="0.25" />
    </radialGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7fff00" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e40af" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="ringGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="82" />
    </clipPath>
  </defs>

  <!-- Outer ambient glow -->
  <circle cx="100" cy="100" r="98" fill="url(#outerGlow)" />

  <!-- Dark background circle -->
  <circle cx="100" cy="100" r="88" fill="url(#bgGlow)" />

  <!-- Cyan outer ring with glow -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#00e5c8" stroke-width="3.5" filter="url(#ringGlow)" opacity="0.9" />
  <circle cx="100" cy="100" r="85" fill="none" stroke="#00e5c8" stroke-width="1.5" opacity="0.6" />

  <!-- Inner content, clipped to circle -->
  <g clip-path="url(#circleClip)">

    <!-- Blue tech arc (left half) -->
    <path d="M 100 22 A 78 78 0 0 0 22 100 A 78 78 0 0 0 100 178 L 100 155 A 55 55 0 0 1 45 100 A 55 55 0 0 1 100 45 Z"
      fill="url(#arcGrad)" opacity="0.85" />

    <!-- Vertical divider line -->
    <line x1="100" y1="20" x2="100" y2="180" stroke="#00e5c8" stroke-width="1" opacity="0.3" />

    <!-- Data bars (left side, center) -->
    <g fill="#00e5c8" opacity="0.75">
      <!-- Horizontal bars, staggered widths -->
      <rect x="52" y="80" width="32" height="3.5" rx="1.5" />
      <rect x="52" y="88" width="24" height="3.5" rx="1.5" />
      <rect x="52" y="96" width="36" height="3.5" rx="1.5" />
      <rect x="52" y="104" width="20" height="3.5" rx="1.5" />
      <rect x="52" y="112" width="28" height="3.5" rx="1.5" />
    </g>

    <!-- Vertical data bars (top center) -->
    <g fill="#00e5c8" opacity="0.65">
      <rect x="88" y="42" width="3" height="16" rx="1.5" />
      <rect x="94" y="36" width="3" height="22" rx="1.5" />
      <rect x="100" y="42" width="3" height="14" rx="0" opacity="0" />
      <rect x="82" y="46" width="3" height="12" rx="1.5" />
    </g>

    <!-- Vertical data bars (bottom center) -->
    <g fill="#00e5c8" opacity="0.65">
      <rect x="88" y="142" width="3" height="16" rx="1.5" />
      <rect x="94" y="148" width="3" height="12" rx="1.5" />
      <rect x="82" y="144" width="3" height="14" rx="1.5" />
    </g>

    <!-- Plus / crosshair markers -->
    <g stroke="#00e5c8" stroke-width="1.5" opacity="0.7">
      <!-- Top plus -->
      <line x1="97" y1="60" x2="103" y2="60" />
      <line x1="100" y1="57" x2="100" y2="63" />
      <!-- Middle plus -->
      <line x1="72" y1="100" x2="78" y2="100" />
      <line x1="75" y1="97" x2="75" y2="103" />
      <!-- Bottom plus -->
      <line x1="97" y1="138" x2="103" y2="138" />
      <line x1="100" y1="135" x2="100" y2="141" />
    </g>

    <!-- Green leaf (right side) -->
    <g filter="url(#glow)">
      <path d="M 152 55
               C 165 68, 168 95, 152 118
               C 136 142, 112 148, 105 152
               C 108 135, 114 112, 128 95
               C 118 105, 110 122, 108 138
               C 100 128, 98 108, 108 88
               C 118 68, 138 52, 152 55 Z"
        fill="url(#leafGrad)" opacity="0.92" />
      <!-- Leaf vein -->
      <path d="M 152 55 C 130 80, 112 110, 108 138"
        stroke="#071a1a" stroke-width="1.5" fill="none" opacity="0.5" />
    </g>

    <!-- Outer arc accent (right) -->
    <path d="M 155 52 A 65 65 0 0 1 178 100 A 65 65 0 0 1 155 148"
      fill="none" stroke="#22c55e" stroke-width="5" stroke-linecap="round" opacity="0.6" />

  </g>

  <!-- Top ring highlight -->
  <path d="M 50 40 A 68 68 0 0 1 150 40"
    fill="none" stroke="white" stroke-width="1" opacity="0.12" />
</svg>
