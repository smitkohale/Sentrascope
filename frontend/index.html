<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#020617" />
    <title>SentraScope | National Intelligence Dashboard</title>
    <meta name="description" content="SentraScope provides real-time environmental intelligence for India — tracking air quality, heat waves, urbanization, and ecological threats from Himalayan air currents to the Western Ghats." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SentraScope | National Intelligence Dashboard" />
    <meta property="og:description" content="Real-time environmental intelligence for India. Monitor AQI, heat waves, urban expansion, and ecological health across all states and union territories." />
    <meta property="og:image" content="/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SentraScope | National Intelligence Dashboard" />
    <meta name="twitter:description" content="Real-time environmental intelligence for India. Monitor AQI, heat waves, urban expansion, and ecological health." />
    <meta name="twitter:image" content="/opengraph.jpg" />

    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="shortcut icon" href="/logo.svg" />

    <!-- Preload critical above-the-fold asset -->
    <link rel="preload" href="/logo.svg" as="image" type="image/svg+xml" />

    <!-- Preconnect for critical third-party origins (reduces TCP + TLS round trips) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.open-meteo.com" crossorigin />
    <link rel="preconnect" href="https://basemaps.cartocdn.com" crossorigin />

    <!-- DNS prefetch for additional external services -->
    <link rel="dns-prefetch" href="https://api.waqi.info" />
    <link rel="dns-prefetch" href="https://firms.modaps.eosdis.nasa.gov" />
    <link rel="dns-prefetch" href="https://api.openuv.io" />
    <link rel="dns-prefetch" href="https://unpkg.com" />
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />

    <!--
      Non-blocking font load: media="print" causes the browser to download
      but not block rendering; onload swaps it to all media types.
    -->
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" />
    </noscript>

    <!--
      Leaflet + heat plugin: loaded with defer so they never block the
      initial paint. Dashboard is lazy-loaded so these will always be
      ready before the map renders.
    -->
    <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
