version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sentrascope
      POSTGRES_PASSWORD: sentrascope
      POSTGRES_DB: sentrascope
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentrascope"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
